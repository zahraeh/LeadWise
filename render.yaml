services:
  # ── FastAPI backend ──────────────────────────────────────────
  - type: web
    name: leadwise-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: INDUSTRY
        value: banking

  # ── Streamlit frontend ───────────────────────────────────────
  - type: web
    name: leadwise-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      python -m streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: leadwise-api
          property: host      # returns hostname only, app.py prepends https://
      - key: INDUSTRY
        value: banking
